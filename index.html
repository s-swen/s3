<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uploader</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <input type="file" id="upload-input" />
    <hr />
    <script>
      const initializeUpload = async (fileName, fileSize, contentType) => {
        try {
          const response = await fetch("/start-upload", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              file_name: fileName,
              file_size: fileSize,
              content_type: contentType,
            }),
          });
          if (!response.ok) {
            throw new Error("initiatize upload failed");
          }
          const result = await response.json();
          console.log(result);
          return result;
        } catch (error) {
          console.log("Error", error);
        }
      };
      const split = (file, chunkSize) => {
        const chunks = [];
        let start = 0;
        while (start < file.size) {
          const end = Math.min(start + chunkSize, file.size);
          chunks.push(file.slice(start, end));
          start = end;
        }
        return chunks;
      };

      const uploadToS3 = async (file, key, chunkSize, urls, fields) => {
        const etags = [];
        const chunks = split(file, chunkSize);
        for (let i = 0; i < chunks.length; i++) {
          try {
            const response = await fetch(urls[i], {
              method: "PUT",
              body: chunks[i],
            });
            if (!response.ok) {
              throw new Error("Upload failed chunk");
            }
            const etag = response.headers.get("ETag");
            console.log(
              `Chunk ${i + 1} of ${chunks.length} uploaded, etag is ${etag}`,
            );
            etags.push(etag);
          } catch (error) {
            console.log(`Error uploading chunk ${i}`);
          }
        }
        return etags;
      };
      const completeUpload = async (key, uploadId, etags) => {
        try {
          const response = await fetch("/complete-upload", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              key: key,
              upload_id: uploadId,
              etags: etags.join(","),
            }),
          });
          if (!response.ok) {
            throw new Error("Error complete upload");
          }
          const result = await response.json();
          return result["url"];
        } catch (error) {
          console.log("Error complete upload", error);
        }
      };
      const handleSuccess = (url, isImage) => {
        console.log("Success", url);
        const section = document.createElement("section");
        if (isImage) {
          const img = document.createElement("img");
          img.src = url;
          img.width = 300;
          section.appendChild(img);
        }
        const link = document.createElement("a");
        link.href = url;
        link.target = "_blank";
        const linkText = document.createTextNode(url);
        link.appendChild(linkText);
        section.appendChild(document.createElement("div"));
        section.appendChild(link);
        document.body.appendChild(section);
        document.body.appendChild(document.createElement("hr"));
      };

      const uploadInput = document.getElementById("upload-input");
      uploadInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (file) {
          const details = await initializeUpload(
            file.name,
            file.size,
            file.type,
          );
          const etags = await uploadToS3(
            file,
            details.key,
            details.chunk_size,
            details.urls,
            details.fields,
          );
          const url = await completeUpload(
            details.key,
            details.upload_id,
            etags,
          );
          if (url) {
            handleSuccess(url, file.type.includes("image"));
          }
        }
      };
    </script>
  </body>
</html>
